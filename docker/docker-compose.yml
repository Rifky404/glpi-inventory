version: "3.9"

services:

  # ─────────────────────────────────────────
  # MariaDB 10.6 LTS (supported by GLPI)
  # ─────────────────────────────────────────
  mariadb:
    image: mariadb:10.6
    container_name: glpi_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb-conf/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - glpi_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # GLPI Application
  # ─────────────────────────────────────────
  glpi:
    image: diouxx/glpi
    container_name: glpi_app
    restart: always
    environment:
      TIMEZONE: ${TIMEZONE}
    volumes:
      - glpi_data:/var/www/html/glpi
    ports:
      - "${GLPI_PORT}:80"
    networks:
      - glpi_network
    depends_on:
      mariadb:
        condition: service_healthy

# ─────────────────────────────────────────
# Volumes (persistent data)
# ─────────────────────────────────────────
volumes:
  mariadb_data:
    driver: local
  glpi_data:
    driver: local

# ─────────────────────────────────────────
# Network
# ─────────────────────────────────────────
networks:
  glpi_network:
    driver: bridge